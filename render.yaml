services:
  - type: web
    name: launchlens-backend
    runtime: python
    runtimeVersion: '3.13'

    buildCommand: |
      cd backend
      pip install -r requirements.txt

    startCommand: |
      cd backend
      uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      # API Keys - Set these in Render Dashboard from GitHub Secrets
      - key: GROQ_API_KEY
        sync: false  # Manually set in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SERPER_API_KEY
        sync: false
      # Fixed values
      - key: ENVIRONMENT
        value: production
      - key: GROQ_MODEL
        value: openai/gpt-oss-20b
      - key: FRONTEND_URL
        value: https://your-lovable-app.lovable.app

    disk:
      name: cache
      mountPath: /var/cache
      sizeGB: 1
